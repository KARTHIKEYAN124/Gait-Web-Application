{% extends "base.html" %}

{% block content %}
<section class="panel narrow">
    <h1>Admin Login</h1>
    <form method="post" class="simple-form">
        <label>Username
            <input type="text" name="username" required>
        </label>
        <label>Password
            <input type="password" name="password" required>
        </label>
        <button class="primary-button" type="submit">Login</button>
    </form>
</section>
{% endblock %}

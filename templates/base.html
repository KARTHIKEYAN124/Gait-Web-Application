<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gait Silhouette Classifier</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="{{ url_for('start') }}">Gait Classifier</a>
        <nav>
            <a href="{{ url_for('classifier') }}">Classifier</a>
            <a href="{{ url_for('models_page') }}">Models Used</a>
            <a href="{{ url_for('comparison') }}">Comparison</a>
            <a href="{{ url_for('survey') }}">Survey</a>
            <a href="{{ url_for('admin_login') }}">Admin</a>
        </nav>
    </header>

    <main class="page">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                        <p>{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>

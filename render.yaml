services:
  - type: web
    name: gait-classifier
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-ml.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: change-this-password
